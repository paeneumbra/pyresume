version: '3'

tasks:

  default:
    desc: Default
    cmds:
      - |
        echo "Home dir: {{.HOME}}"
        echo "Root dir: {{.ROOT_DIR}}"
        echo "Working dir: {{.USER_WORKING_DIR}}"
        echo "OS: {{OS}}"
        task --list
    silent: true

  assert:
    cmds:
      - for:
          var: REQUIRED_TOOLS
          split: ','
          as: TOOL
        cmd: |
          [ -n "$(which {{ .TOOL }})" ] || ( \
            echo "ERROR: `{{ .TOOL }}` not found" && exit 1; \
          )
    silent: true
    internal: true
    vars:
      REQUIRED_TOOLS: prek, uv

  setup:
    deps: [assert]
    desc: Set up uv and prek
    cmds:
      - prek install
      - prek auto-update
      - uv sync

  update:
    deps: [assert]
    desc: Update uv and prek
    cmds:
      - task: uv_update
      - prek auto-update
      - prek cache gc
      - prek validate-config

  uv_update:
    internal: true
    deps: [assert]
    desc: Update uv dependencies
    cmds:
      - rm -rf .venv
      - uv lock --upgrade
      - uv sync

  run:
    aliases: [pre_commit_run]
    deps: [assert]
    desc: Run prek on all files
    cmds:
      - prek run --color always --all-files

  test:
    aliases: [uv_test]
    deps: [assert]
    desc: Run tests using uv
    cmds:
      - uv run pytest

  resume_minimal:
    deps: [assert]
    desc: Generate example resume with minimal theme
    cmds:
      - uv run pyresume src/pyresume/resources/example-resume.md --minimal

  resume_clean:
    deps: [assert]
    desc: Generate example resume with clean theme
    cmds:
      - uv run pyresume src/pyresume/resources/example-resume.md --clean

  resume_slate:
    deps: [assert]
    desc: Generate example resume with slate theme
    cmds:
      - uv run pyresume src/pyresume/resources/example-resume.md --slate
